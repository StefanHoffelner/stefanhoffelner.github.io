title: "Stefan Hoffelner"
email: "stefan.hoffelner@tuwien.ac.at"
description: "Academic webpage of Stefan Hoffelner, set theory and mathematical logic."
baseurl: ""
url: "https://stefanhoffelner.github.io"
lang: "en"

markdown: kramdown
kramdown:
  math_engine: mathjax

collections:
  papers:
    output: true
    permalink: /papers/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
